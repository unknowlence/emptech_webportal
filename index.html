<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal Assignment</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="top-section">
        <div class="left-side">
            <a href="index.html">Home</a>
            <a href="pages/about.html">About</a>
            <a href="pages/org.html">Organization</a>
        </div>
        <div class="right-side">
            <a href="https://gmail.google/">Gmail</a>
            <a href="https://images.google/">Images</a>
            <img 
            class="app-icon"
            src="https://cdn-icons-png.flaticon.com/512/82/82122.png">
            <img 
            class="profile-icon"
            src="https://static.wikia.nocookie.net/houkai-star-rail/images/e/ef/Character_Phainon_Icon.png/revision/latest/thumbnail/width/360/height/360?cb=20250620124711">
        </div>
    </div>

    <div class="divider"></div>

    <div class="middle-section">
        <form class="search-form" action="https://www.google.com/search" method="GET">
            <img 
                class="m-logo"
                src="https://static.wikia.nocookie.net/houkai-star-rail/images/2/29/Honkai_Star_Rail.png/revision/latest?cb=20230707214654">
            <div class="search-form-input">
                <img 
                    class="search-icon"
                    src="https://www.iconpacks.net/icons/2/free-search-icon-2907-thumb.png">
                    <label for="search">Search</label>
                    <input type="text" name="q" id="search" autocomplete="off">
            </div>
            <div class="search-buttons">
                <button type="submit">Search</button>
                <button type="submit">I'm Feeling Unlucky</button>
            </div>
        </form>
    </div>
</body>
</html>
